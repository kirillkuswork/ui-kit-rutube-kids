# Default values for ..
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ""
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets:
  - name: "nexus-cyrm-tech-rupor"

nameOverride: ""
fullnameOverride: "cyber-ui-kit"

ingress:
  enabled: true
  tls: {}
#    - hosts:
#        - rupor-player.dev.media.cyrm.ru
#      secretName: "tls-dev.media.cyrm.ru"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: cyber-ui-kit.dev.media.cyrm.ru
      paths:
        - path: /
          port: 80
          pathType: Prefix
          backend:
            service:
              name: cyber-ui-kit
              port:
                number: 80

resources:
  limits:
    cpu: 200m
    memory: 200Mi
  requests:
    cpu: 50m
    memory: 50Mi

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

podAnnotations: {}
podSecurityContext: {}
  # fsGroup: 2000

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  name: "cyber-ui-kit"

service:
  type: ClusterIP
  ports:
    - name: http
      containerPort: 80
      protocol: TCP # Support only TCP or UDP

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

env:
  base: {}
